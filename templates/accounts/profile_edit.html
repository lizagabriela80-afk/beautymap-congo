{% extends "base/base.html" %}

{% block title %}Modifier mon profil{% endblock %}

{% block content %}
<style>

/* Container */
.profile-container {
    max-width: 650px;
    margin: 100px auto;
    background: linear-gradient(145deg, var(--ink3), var(--ink2));
    padding: 35px;
    border-radius: var(--r);
    border: 1px solid var(--ink4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
}

/* Glow effet premium */
.profile-container::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(circle at top, var(--glow), transparent 60%);
    opacity: 0.6;
}

/* Header */
.profile-header {
    text-align: center;
    margin-bottom: 30px;
}

.profile-title {
    color: var(--gold);
    font-size: 24px;
    font-weight: 600;
}

.profile-subtitle {
    color: var(--mut);
    font-size: 14px;
}

/* Avatar */
.profile-avatar-wrapper {
    position: relative;
    width: 110px;
    margin: 0 auto 20px;
}

.profile-avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold);
    transition: var(--trans);
}

.profile-avatar:hover {
    transform: scale(1.05);
}

/* Inputs group */
.form-group {
    margin-bottom: 20px;
}

/* Labels */
label {
    color: var(--txt);
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
}

/* Inputs */
.form-control {
    width: 100%;
    border-radius: var(--rsm);
    padding: 12px;
    background: var(--ink4);
    border: 1px solid var(--ink5);
    color: var(--parch);
    font-size: 14px;
    transition: var(--trans);
}

.form-control::placeholder {
    color: var(--mut);
}

.form-control:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--glow);
    background: var(--ink3);
}

/* File input custom */
input[type="file"] {
    padding: 8px;
    cursor: pointer;
}

/* Button */
.btn-save {
    margin-top: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-lt));
    border: none;
    border-radius: var(--rsm);
    padding: 14px;
    width: 100%;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: var(--trans);
}

.btn-save:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px var(--glow);
}

/* Divider */
.divider {
    height: 1px;
    background: var(--ink5);
    margin: 25px 0;
}

/* Responsive */
@media (max-width: 768px) {
    .profile-container {
        margin: 80px 15px;
        padding: 25px;
    }

    .profile-title {
        font-size: 20px;
    }

    .profile-avatar {
        width: 90px;
        height: 90px;
    }
}

</style>

<div class="profile-container">

    <div class="profile-header">
        <h3 class="profile-title">Modifier mon profil</h3>
        <p class="profile-subtitle">Mets à jour tes informations personnelles</p>
    </div>

    <div class="profile-avatar-wrapper">
        {% if user.profile.image %}
            <img src="{{ user.profile.image.url }}" class="profile-avatar">
        {% endif %}
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="first_name" class="form-control" placeholder="Votre nom" value="{{ user.first_name }}">
        </div>

        <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="last_name" class="form-control" placeholder="Votre prénom" value="{{ user.last_name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Votre email" value="{{ user.email }}">
        </div>

        <div class="divider"></div>

        <div class="form-group">
            <label>Photo de profil</label>
            <input type="file" name="image" class="form-control">
        </div>

        <button type="submit" class="btn-save">
            💾 Enregistrer les modifications
        </button>
    </form>

</div>

{% endblock %}
